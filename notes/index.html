    'GitHub',
    'MySQL',
    'PostgreSQL'
  ];

  // --- 상태
  const state = {
    q:'', cat:'', sort:'newest',
    // 백준 전용
    baekTier:'',            // Bronze/Silver/Gold/Platinum/Diamond/Ruby
    baekRank:'',            // V/IV/III/II/I
    // 프로그래머스 전용
    progLevel:''            // 0~5
  };

  // DOM
  const $q = document.getElementById('q');
  const $groups = document.getElementById('groups');
  const $empty = document.getElementById('empty');
  const $cat = document.getElementById('cat');
  const $sort = document.getElementById('sort');

  // --- 유틸: 백준/프로그래머스 메타 파싱 -----------------------
  const BAEK_TIER_MAP = {
    bronze:'Bronze', silver:'Silver', gold:'Gold',
    platinum:'Platinum', diamond:'Diamond', ruby:'Ruby'
  };
  const BAEK_RANKS = ['V','IV','III','II','I'];

  function parseBaekMeta(url){
    // 기대 경로: /notes/baekjoon/{tier}/{rank}/daily_...html
    // 과거 데이터: /notes/baekjoon/{tier}/daily_...html (rank 없음 → 현재는 V 폴더 사용)
    const parts = url.split('/').filter(Boolean);
    const i = parts.indexOf('baekjoon');
    if (i === -1 || !parts[i+1]) return null;
    const tierKey = (parts[i+1] || '').toLowerCase();
    const tier = BAEK_TIER_MAP[tierKey] || null;
    let rank = null;
    const maybeRank = parts[i+2]; // 새 구조일 때
    if (maybeRank && BAEK_RANKS.includes(maybeRank)) rank = maybeRank;
    return tier ? {tier, rank} : null;
  }

  function parseProgrammersLevel(url){
    // 기대 경로: /notes/programmers/Level_{n}/...
    const m = /\/programmers\/Level_(\d)\//i.exec(url);
    return m ? m[1] : null;
  }

  // --- 카테고리 옵션 렌더
  function renderCatOptions(){
    $cat.innerHTML = `<option value="">전체 카테고리</option>` +
      CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('');
  }

  const byDateDesc = (a,b)=> new Date(b.date) - new Date(a.date);
  const byDateAsc  = (a,b)=> new Date(a.date) - new Date(b.date);

  // --- 필터 적용
  function applyFilters(){
    const q = state.q.trim().toLowerCase();
    let rows = NOTES.filter(n=>{
      const inQ = !q || `${n.title} ${n.meta}`.toLowerCase().includes(q);
      const inCat = !state.cat || state.cat === n.category;
      if (!(inQ && inCat)) return false;

      // 카테고리별 추가 필터
      if (n.category === '코딩 테스트(백준 알고리즘)'){
        const meta = parseBaekMeta(n.url);
        if (state.baekTier && (!meta || meta.tier !== state.baekTier)) return false;
        if (state.baekRank && (!meta || meta.rank !== state.baekRank)) return false;
      }
      if (n.category === '코딩 테스트(프로그래머스)'){
        const level = parseProgrammersLevel(n.url);
        if (state.progLevel && level !== state.progLevel) return false;
      }
      return true;
    });
    rows.sort(state.sort==='newest' ? byDateDesc : byDateAsc);
    return rows;
  }

  // --- 그룹 렌더 (0개여도 카드 유지)
  function renderGroups(rows){
    const byCat = {};
    rows.forEach(n=>{ (byCat[n.category] ||= []).push(n) });

    // 필터가 켜진 카테고리는 항목 0개여도 강제 표시
    const FORCE_SHOW = new Set();
    if (state.baekTier || state.baekRank) FORCE_SHOW.add('코딩 테스트(백준 알고리즘)');
    if (state.progLevel) FORCE_SHOW.add('코딩 테스트(프로그래머스)');
    if (state.cat) FORCE_SHOW.add(state.cat);

    const catsSource = state.cat ? [state.cat] : CATEGORIES;
    const cats = catsSource.filter(c => byCat[c] || FORCE_SHOW.has(c));

    if (cats.length === 0){
      $groups.innerHTML = '';
      $empty.style.display = 'block';
      return;
    }
    $empty.style.display = 'none';

    $groups.innerHTML = cats.map(c=>{
      const items = byCat[c] || [];
      const count = items.length;

      let extraFilters = '';
      if (c === '코딩 테스트(백준 알고리즘)'){
        extraFilters = `
          <div class="mini-filters">
            <span class="count">${count}개</span>
            <div class="pair">
              <label for="baek-tier">등급</label>
              <select id="baek-tier" class="input" aria-label="백준 등급">
                <option value="">전체</option>
                ${Object.values(BAEK_TIER_MAP).map(v=>`<option value="${v}" ${state.baekTier===v?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
            <div class="pair">
              <label for="baek-rank">난이도</label>
              <select id="baek-rank" class="input" aria-label="백준 난이도">
                <option value="">전체</option>
                ${BAEK_RANKS.map(v=>`<option value="${v}" ${state.baekRank===v?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
          </div>
        `;
      } else if (c === '코딩 테스트(프로그래머스)'){
        extraFilters = `
          <div class="mini-filters">
            <span class="count">${count}개</span>
            <div class="pair">
              <label for="prog-level">레벨</label>
              <select id="prog-level" class="input" aria-label="프로그래머스 레벨">
                <option value="">전체</option>
                ${['0','1','2','3','4','5'].map(v=>`<option value="${v}" ${state.progLevel===v?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
          </div>
        `;
      } else {
        extraFilters = `<div class="mini-filters"><span class="count">${count}개</span></div>`;
      }

      return `<section class="card">
        <div class="group-header">
          <div class="card-head" style="margin:0;padding:0;border:none">
            <strong>${c}</strong>
          </div>
          ${extraFilters}
        </div>
        <div class="items">
          ${items.map(itemTpl).join('')}
        </div>
      </section>`;
    }).join('');

    // 동적 셀렉트 이벤트 바인딩
    const $baekTier = document.getElementById('baek-tier');
    if ($baekTier){ $baekTier.addEventListener('change', e=>{ state.baekTier = e.target.value; render(); }); }
    const $baekRank = document.getElementById('baek-rank');
    if ($baekRank){ $baekRank.addEventListener('change', e=>{ state.baekRank = e.target.value; render(); }); }
    const $progLevel = document.getElementById('prog-level');
    if ($progLevel){ $progLevel.addEventListener('change', e=>{ state.progLevel = e.target.value; render(); }); }
  }

  function itemTpl(n){
    // 타이틀 옆에 등급/레벨 배지
    let badge = '';
    if (n.category === '코딩 테스트(백준 알고리즘)'){
      const m = parseBaekMeta(n.url);
      if (m) badge = ` <span class="muted">· ${m.tier}${m.rank?(' '+m.rank):''}</span>`;
    } else if (n.category === '코딩 테스트(프로그래머스)'){
      const lv = parseProgrammersLevel(n.url);
      if (lv != null) badge = ` <span class="muted">· Lv.${lv}</span>`;
    }
    return `<a class="list-item" href="${n.url}">
      <span class="title">${n.title}${badge}</span>
      <span class="meta">${n.meta}</span>
    </a>`
  }

  function render(){
    const rows = applyFilters();
    renderGroups(rows);
  }

  // 이벤트
  $q.addEventListener('input', (e)=>{ state.q = e.target.value; render(); });
  $cat.addEventListener('change', (e)=>{ state.cat = e.target.value; render(); });
  $sort.addEventListener('change', (e)=>{ state.sort = e.target.value; render(); });

  // init
  renderCatOptions();
  render();
  </script>
</body>
</html>
