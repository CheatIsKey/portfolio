<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notes — spring-jpa.dev</title>
  <!-- styles.css 전역 스타일만 사용하여 사이트 전체 톤과 일관화 -->
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* 페이지 전용 최소 스타일 (레이아웃만) */
    .filters{display:grid;grid-template-columns:1fr 220px 160px;gap:10px;margin:10px 0 18px}
    @media (max-width:820px){.filters{grid-template-columns:1fr;}}
    .groups{display:grid;gap:12px;margin-top:12px}
    .group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .items{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:10px}
    .count{color:var(--muted)}
  </style>
</head>
<body>
  <header class="site-header container">
    <a class="brand" href="/">spring-jpa.dev</a>
    <nav class="nav">
      <a href="/projects/">Projects</a>
      <a class="active" href="/notes/">Notes</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="section-title">Notes</h1>
    <p class="muted">카테고리로만 깔끔하게 묶고, 정렬(최신/오래된)만 제공합니다.</p>

    <div class="filters">
      <input id="q" class="input" type="search" placeholder="검색: 스프링 부트, JPA, 코딩 테스트..." />
      <select id="cat" class="input" aria-label="카테고리 선택">
        <option value="">전체 카테고리</option>
      </select>
      <select id="sort" class="input" aria-label="정렬">
        <option value="newest">최신순</option>
        <option value="oldest">오래된순</option>
      </select>
    </div>

    <div class="groups" id="groups"></div>
    <div class="muted" id="empty" style="display:none">검색/필터에 해당하는 노트가 없어요.</div>
  </main>

  <footer class="container site-footer">
    <span>© spring-jpa.dev</span>
    <span class="muted">Built with Spring • JPA • QueryDSL</span>
  </footer>

  <script>
  // --- 카테고리 권장 명칭 (사이트 전역 톤 맞춤) ------------------------------
  // • 스프링 부트
  // • 프로젝트 실습
  // • JPA · Spring Data JPA · QueryDSL
  // • 코딩 테스트(프로그래머스)

  const NOTES = [
    { title: 'JPA 기본 개념 정리', url: '/notes/jpa/basics/JPA-01-basics.html',
      meta: '영속성 컨텍스트 · 플러시 · 엔티티 생명주기',
      category: 'JPA · Spring Data JPA · QueryDSL', date: '2024-01-10' },
    { title: 'JPA 연관관계 매핑', url: '/notes/jpa/basics/JPA-02-relations.html',
      meta: '단방향 · 양방향 · 연관관계 주인 · 로딩 전략',
      category: 'JPA · Spring Data JPA · QueryDSL', date: '2024-01-18' },
    { title: 'JPA 프록시와 로딩 전략', url: '/notes/jpa/basics/JPA-03-loading.html',
      meta: '지연 로딩 · N+1 · EntityGraph · 페치 조인 · 값 타입 · 전이/고아',
      category: 'JPA · Spring Data JPA · QueryDSL', date: '2024-01-24' },
    { title: 'JPQL과 쿼리 API', url: '/notes/jpa/basics/JPA-04-jpql.html',
      meta: '프로젝션 · 조인 · 페이징 · 서브쿼리 · 경로 · 함수 · 페치 조인 · 벌크',
      category: 'JPA · Spring Data JPA · QueryDSL', date: '2024-02-02' },

    { title: 'Validation', url: '/notes/Validation.html',
      meta: 'springboot · Thymeleaf',
      category: '스프링 부트', date: '2024-02-15' },

    { title: '프로그래머스 - Level 0 - PCCE 1번 ~ 5번', url: '/notes/programmers/Level_0/zero_pcce_1to5.html',
      meta: '1번 ~ 5번',
      category: '코딩 테스트(프로그래머스)', date: '2025-09-09' },
    { title: '프로그래머스 - Level 0 - PCCE 6번 ~ 8번', url: '/notes/programmers/Level_0/zero_pcce_6to8.html',
      meta: '6번 ~ 8번',
      category: '코딩 테스트(프로그래머스)', date: '2025-09-10' },
    { title: '프로그래머스 - Level 0 - PCCE_1 1번 ~ 5번', url: '/notes/programmers/Level_0/zero_pcce_1_1to5.html',
      meta: '1번 ~ 5번',
      category: '코딩 테스트(프로그래머스)', date: '2025-09-11' },
    { title: '프로그래머스 - Level 0 - PCCE_1 6번 ~ 8번', url: '/notes/programmers/Level_0/zero_pcce_1_6to8.html',
      meta: '6번 ~ 8번',
      category: '코딩 테스트(프로그래머스)', date: '2025-09-11' },
    { title: '프로그래머스 - Level 0 - Daily 문제 묶음', url: '/notes/programmers/Level_0/daily_0912_1to5.html',
      meta: '5문제',
      category: '코딩 테스트(프로그래머스)', date: '2025-09-12' },
    { title: '프로그래머스 - Level 0 - Daily 문제 묶음', url: '/notes/programmers/Level_0/daily_0913_1to5.html',
      meta: '5문제',
      category: '코딩 테스트(프로그래머스)', date: '2025-09-13' },

    { title: '스프링 트랜잭션 전파/격리', url: '/notes/spring-transaction.html',
      meta: '실전 예제 요약',
      category: '스프링 부트', date: '2024-03-20' },

    // 예시)
    // { title: '프로젝트 X 회고', url: '/notes/projects/x-postmortem.html', meta: '운영 이슈 · 배운 점', category: '프로젝트 실습', date: '2024-04-01' },
    // { title: '프로그래머스 - 기능개발', url: '/notes/ps/programmers-feature-dev.html', meta: '스택/큐', category: '코딩 테스트(프로그래머스)', date: '2024-04-12' },
  ];

  const CATEGORIES = [
    '스프링 부트',
    '프로젝트 실습',
    'JPA · Spring Data JPA · QueryDSL',
    '코딩 테스트(프로그래머스)'
  ];

  const state = { q:'', cat:'', sort:'newest' };

  const $q = document.getElementById('q');
  const $groups = document.getElementById('groups');
  const $empty = document.getElementById('empty');
  const $cat = document.getElementById('cat');
  const $sort = document.getElementById('sort');

  function renderCatOptions(){
    $cat.innerHTML = `<option value="">전체 카테고리</option>` +
      CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('');
  }

  const byDateDesc = (a,b)=> new Date(b.date) - new Date(a.date);
  const byDateAsc  = (a,b)=> new Date(a.date) - new Date(b.date);

  function applyFilters(){
    const q = state.q.trim().toLowerCase();
    let rows = NOTES.filter(n=>{
      const inQ = !q || `${n.title} ${n.meta}`.toLowerCase().includes(q);
      const inCat = !state.cat || state.cat === n.category;
      return inQ && inCat;
    });
    rows.sort(state.sort==='newest' ? byDateDesc : byDateAsc);
    return rows;
  }

  function renderGroups(rows){
    const byCat = {};
    rows.forEach(n=>{ (byCat[n.category] ||= []).push(n) });
    const cats = (state.cat? [state.cat] : CATEGORIES).filter(c=>byCat[c]);

    if (rows.length === 0){
      $groups.innerHTML = ''; $empty.style.display = 'block'; return;
    }
    $empty.style.display = 'none';

    $groups.innerHTML = cats.map(c=>{
      const items = byCat[c];
      return `<section class="card">
        <div class="group-header">
          <div class="card-head" style="margin:0;padding:0;border:none">
            <strong>${c}</strong>
          </div>
          <span class="count">${items.length}개</span>
        </div>
        <div class="items">
          ${items.map(itemTpl).join('')}
        </div>
      </section>`
    }).join('');
  }

  function itemTpl(n){
    return `<a class="list-item" href="${n.url}">
      <span class="title">${n.title}</span>
      <span class="meta">${n.meta}</span>
    </a>`
  }

  function render(){
    const rows = applyFilters();
    renderGroups(rows);
  }

  // 이벤트
  $q.addEventListener('input', (e)=>{ state.q = e.target.value; render(); });
  $cat.addEventListener('change', (e)=>{ state.cat = e.target.value; render(); });
  $sort.addEventListener('change', (e)=>{ state.sort = e.target.value; render(); });

  // init
  renderCatOptions();
  render();
  </script>
</body>
</html>
