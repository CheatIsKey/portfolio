<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop — Projects — spring-jpa.dev</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .hero h1{margin-bottom:.2rem}
    .hero .subtitle{margin-top:.4rem;color:var(--muted)}
    .crumb{font-size:.9rem;color:var(--muted);margin-bottom:6px}
    .grid{display:grid;gap:18px}
    @media(min-width:980px){.grid{grid-template-columns:2fr 1fr}}
    .section-title{margin:6px 0 10px}
    .chapters{display:grid;gap:10px;margin-top:6px}
    a.chapter{display:flex;align-items:center;gap:12px;padding:12px 14px;
      border:1px solid var(--border);border-radius:10px;background:var(--card);
      text-decoration:none;color:inherit;transition:.15s ease}
    a.chapter:hover{transform:translateY(-1px);box-shadow:0 2px 12px rgba(0,0,0,.04)}
    .no{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;font-weight:700}
    .ctitle{font-weight:600;margin:0}
    .cmeta{font-size:.92rem;color:var(--muted)}
    .chev{margin-left:auto;opacity:.5}
    .aside{background:var(--card);padding:14px;border-radius:10px}
    .aside ul{list-style:none;padding-left:0;margin:8px 0 0}
    .aside li{margin:6px 0}
    .aside a{text-decoration:none}
  </style>
</head>
<body>
<header class="site-header container">
  <a class="brand" href="/">spring-jpa.dev</a>
  <nav class="nav">
    <a class="active" href="/projects/">Projects</a>
    <a href="/notes/">Notes</a>
    <a class="cta" href="https://shop.spring-jpa.dev" target="_blank" rel="noreferrer">Shop Demo →</a>
  </nav>
</header>

<main class="container">
  <div class="crumb"><a href="/projects/">Projects</a> / Shop</div>

  <section class="hero">
    <h1>Shop 서비스</h1>
    <p class="subtitle">Spring Boot · Spring Data JPA · QueryDSL — SDLC 문서</p>
    <div class="hero-actions">
      <a class="btn" href="/projects/shop/01-requirements/">처음부터 읽기</a>
      <a class="btn ghost" href="https://shop.spring-jpa.dev" target="_blank" rel="noreferrer">라이브 데모</a>
    </div>
  </section>

  <div class="grid">
    <section>
      <h2 class="section-title">챕터</h2>
      <div class="chapters" id="chapters"></div>
    </section>

    <aside class="aside">
      <strong>빠른 링크</strong>
      <ul>
        <li><a href="/projects/shop/01-requirements/">요구사항</a></li>
        <li><a href="/assets/projects/shop/usecase.png" target="_blank">유스케이스(대표)</a></li>
        <li><a href="/assets/projects/shop/class-diagram.png" target="_blank">클래스 다이어그램</a></li>
      </ul>
    </aside>
  </div>
</main>

<script>
const CHAPTERS = [
  { id:'01-requirements', title:'요구사항 분석', meta:'유스케이스/시퀀스/시스템/요구 목록' },
  { id:'02-design',       title:'설계',         meta:'클래스/ERD/아키텍처 결정' },
  { id:'03-coding',       title:'코딩',         meta:'구현 스냅샷/설명' },
  { id:'04-testing',      title:'테스트',       meta:'케이스/전략/커버리지' },
  { id:'05-maintenance',  title:'유지보수',     meta:'배포/운영/회고/개선' }
];
const to = id => `/projects/shop/${id}/`;
document.getElementById('chapters').innerHTML =
  CHAPTERS.map((c,i)=>`
    <a class="chapter" href="${to(c.id)}">
      <div class="no">${String(i+1).padStart(2,'0')}</div>
      <div><div class="ctitle">${c.title}</div><div class="cmeta">${c.meta}</div></div>
      <div class="chev">→</div>
    </a>
  `).join('');
</script>
</body>
</html>
